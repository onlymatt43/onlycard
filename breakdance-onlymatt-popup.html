<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Breakdance — ONLYMATT Carre</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f0f0; font-family: system-ui, sans-serif; padding: 24px; }
h1 { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 6px; }
p.sub { font-size: 12px; color: #888; margin-bottom: 24px; }
.prev { background: #fff; border-radius: 12px; padding: 32px; margin-bottom: 32px; display: flex; justify-content: center; }
.block { margin-bottom: 20px; }
.bh { display: flex; align-items: center; justify-content: space-between; background: #1e1e1e; padding: 8px 14px; border-radius: 8px 8px 0 0; }
.bl { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
.bl.h { color: #f97316; } .bl.c { color: #3b82f6; } .bl.j { color: #facc15; }
.bc { background: #fff; color: #111; border: none; padding: 5px 14px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.bc:hover { background: #e5e5e5; }
.cp { color: #4ade80; font-size: 12px; margin-left: 8px; display: none; }
textarea { width: 100%; font-family: monospace; font-size: 12px; background: #252525; color: #d4d4d4; border: none; padding: 14px; border-radius: 0 0 8px 8px; resize: vertical; min-height: 80px; line-height: 1.5; }

.info-box { background: #e8f4fd; border-left: 3px solid #3b82f6; padding: 10px 14px; border-radius: 4px; margin-bottom: 20px; font-size: 12px; color: #1e40af; }
</style>
</head>
<body>

<h1>Breakdance &mdash; ONLYMATT Carr&eacute; (sans bouton)</h1>
<p class="sub">Affiche me.onlymatt.ca identique dans un cadre carr&eacute; 1:1, sans popup et sans clic suppl&eacute;mentaire</p>

<div class="info-box">
  Ce snippet affiche directement <strong>me.onlymatt.ca</strong> en carr&eacute; (ratio 1:1), avec le m&ecirc;me contenu exact, sans passer par window.open.
</div>

<!-- Live preview -->
<div class="prev">
  <iframe
    src="https://me.onlymatt.ca"
    title="ONLYMATT Carr&eacute;"
    style="width:min(92vw,600px);aspect-ratio:1/1;height:auto;border:none;display:block;background:#000;border-radius:12px;"
  ></iframe>
</div>

<div class="block">
  <div class="bh"><span class="bl h">HTML</span><div><button class="bc" onclick="doCopy('te','ce')">Copier</button><span class="cp" id="ce">&#10003;</span></div></div>
  <textarea id="te" readonly style="min-height:90px;"></textarea>
</div>

<script>
function doCopy(textId, confirmId) {
  navigator.clipboard.writeText(document.getElementById(textId).value).then(function() {
    var el = document.getElementById(confirmId);
    el.style.display = 'inline';
    setTimeout(function() { el.style.display = 'none'; }, 1800);
  });
}

document.getElementById('te').value =
'<iframe\n' +
'  src="https://me.onlymatt.ca"\n' +
'  style="width:100%;max-width:600px;aspect-ratio:1/1;height:auto;border:none;display:block;"\n' +
'></iframe>';
</script>
</body>
</html>
