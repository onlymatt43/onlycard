<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Breakdance - ONLYMATT Carre</title>
<style>
:root {
  --bg: #f3f4f6;
  --card: #ffffff;
  --ink: #111827;
  --muted: #6b7280;
  --header: #111827;
  --accent: #f97316;
  --ok: #22c55e;
  --border: #e5e7eb;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  padding: 16px;
}

.wrap {
  width: 100%;
  max-width: 920px;
  margin: 0 auto;
}

h1 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 6px;
}

.sub {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.45;
  margin-bottom: 16px;
}

.note {
  background: #e8f4fd;
  color: #1d4ed8;
  border-left: 3px solid #3b82f6;
  border-radius: 6px;
  padding: 12px 14px;
  font-size: 12px;
  line-height: 1.45;
  margin-bottom: 20px;
}

.preview {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 24px;
}

.square {
  position: relative;
  width: min(100%, 600px);
  margin: 0 auto;
}

.square::before {
  content: "";
  display: block;
  padding-top: 100%;
}

.square iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  border-radius: 12px;
  background: #000;
}

.block {
  margin-bottom: 20px;
}

.block-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: var(--header);
  border-radius: 8px 8px 0 0;
  padding: 10px 12px;
}

.label {
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
}

.copy-btn {
  background: #fff;
  color: #111827;
  border: 0;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  padding: 6px 12px;
}

.copy-btn:hover {
  background: #f3f4f6;
}

.copied {
  color: var(--ok);
  display: none;
  font-size: 12px;
  margin-left: 8px;
}

textarea {
  width: 100%;
  min-height: 180px;
  resize: vertical;
  border: 0;
  border-radius: 0 0 8px 8px;
  padding: 14px;
  background: #1f2937;
  color: #e5e7eb;
  font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

@media (max-width: 640px) {
  body { padding: 12px; }
  .preview { padding: 10px; }
  textarea { min-height: 220px; }
}
</style>
</head>
<body>
<div class="wrap">
  <h1>Breakdance &mdash; ONLYMATT Carr&eacute;</h1>
  <p class="sub">Affiche la page me.onlymatt.ca au complet dans un cadre carr&eacute; responsive 1:1.</p>

  <div class="note">
    La page reste identique. Le carr&eacute; vient du conteneur d'embed, pas d'un popup. Si le contenu est plus haut que le carr&eacute;, il reste consultable dans l'iframe.
  </div>

  <div class="preview">
    <div class="square">
      <iframe src="https://me.onlymatt.ca" title="ONLYMATT"></iframe>
    </div>
  </div>

  <div class="block">
    <div class="block-head">
      <span class="label">HTML</span>
      <div>
        <button type="button" class="copy-btn" onclick="copyCode()">Copier</button>
        <span class="copied" id="copied">&#10003;</span>
      </div>
    </div>
    <textarea id="code" readonly></textarea>
  </div>
</div>

<script>
var snippet = [
  '<div style="position:relative;width:100%;max-width:600px;">',
  '  <div style="padding-top:100%;"></div>',
  '  <iframe',
  '    src="https://me.onlymatt.ca"',
  '    title="ONLYMATT"',
  '    style="position:absolute;inset:0;width:100%;height:100%;border:none;display:block;"',
  '  ></iframe>',
  '</div>'
].join('\n');

document.getElementById('code').value = snippet;

function copyCode() {
  var text = document.getElementById('code').value;
  var copied = document.getElementById('copied');

  function showCopied() {
    copied.style.display = 'inline';
    setTimeout(function() {
      copied.style.display = 'none';
    }, 1800);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showCopied);
    return;
  }

  var helper = document.createElement('textarea');
  helper.value = text;
  document.body.appendChild(helper);
  helper.select();
  document.execCommand('copy');
  document.body.removeChild(helper);
  showCopied();
}
</script>
</body>
</html>
