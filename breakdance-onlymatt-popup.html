<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Breakdance — ONLYMATT Popup</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f0f0; font-family: system-ui, sans-serif; padding: 24px; }
h1 { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 6px; }
p.sub { font-size: 12px; color: #888; margin-bottom: 24px; }
.prev { background: #fff; border-radius: 12px; padding: 32px; margin-bottom: 32px; display: flex; justify-content: center; }
.block { margin-bottom: 20px; }
.bh { display: flex; align-items: center; justify-content: space-between; background: #1e1e1e; padding: 8px 14px; border-radius: 8px 8px 0 0; }
.bl { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
.bl.h { color: #f97316; } .bl.c { color: #3b82f6; } .bl.j { color: #facc15; }
.bc { background: #fff; color: #111; border: none; padding: 5px 14px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.bc:hover { background: #e5e5e5; }
.cp { color: #4ade80; font-size: 12px; margin-left: 8px; display: none; }
textarea { width: 100%; font-family: monospace; font-size: 12px; background: #252525; color: #d4d4d4; border: none; padding: 14px; border-radius: 0 0 8px 8px; resize: vertical; min-height: 80px; line-height: 1.5; }

/* preview styles */
.omp-trigger { display: inline-flex; align-items: center; gap: 10px; background: #000; color: #fff; border: none; border-radius: 14px; padding: 12px 22px; cursor: pointer; font-size: 14px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; transition: transform .2s, box-shadow .2s; box-shadow: 0 4px 20px rgba(0,0,0,.18); position: relative; overflow: hidden; }
.omp-trigger:hover { transform: scale(1.04); box-shadow: 0 8px 32px rgba(0,0,0,.28); }
@keyframes ompShimmer { 0% { transform: translateX(-100%) skewX(-15deg); } 100% { transform: translateX(250%) skewX(-15deg); } }
.omp-trigger::after { content:''; position:absolute; top:0; left:0; width:40%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent); animation:ompShimmer 3s ease-in-out infinite; pointer-events:none; }
.omp-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:9999; align-items:center; justify-content:center; padding:16px; }
.omp-overlay.open { display:flex; }
.omp-modal { background:#000; border-radius:20px; overflow:hidden; width:100%; max-width:420px; height:80vh; max-height:720px; position:relative; box-shadow:0 24px 80px rgba(0,0,0,.5); }
.omp-close { position:absolute; top:12px; right:14px; background:rgba(255,255,255,.12); border:none; color:#fff; font-size:18px; width:32px; height:32px; border-radius:50%; cursor:pointer; z-index:10; display:flex; align-items:center; justify-content:center; transition:background .2s; }
.omp-close:hover { background:rgba(255,255,255,.25); }
.omp-iframe { width:100%; height:100%; border:none; display:block; }
</style>
</head>
<body>

<h1>Breakdance &mdash; ONLYMATT Popup</h1>
<p class="sub">Colle chaque bloc dans l'onglet correspondant &mdash; Breakdance &rarr; Code personnalis&eacute;</p>

<!-- Live preview -->
<div class="prev">
  <button class="omp-trigger" onclick="document.getElementById('ompOverlayPrev').classList.add('open')">
    <span>&#9776;</span> ONLYMATT
  </button>
</div>

<div class="omp-overlay" id="ompOverlayPrev" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="omp-modal">
    <button class="omp-close" onclick="document.getElementById('ompOverlayPrev').classList.remove('open')">&times;</button>
    <iframe class="omp-iframe" src="https://me.onlymatt.ca" title="ONLYMATT"></iframe>
  </div>
</div>

<div class="block">
  <div class="bh"><span class="bl h">HTML</span><div><button class="bc" onclick="doCopy('th','ch')">Copier</button><span class="cp" id="ch">&#10003;</span></div></div>
  <textarea id="th" readonly></textarea>
</div>
<div class="block">
  <div class="bh"><span class="bl c">CSS</span><div><button class="bc" onclick="doCopy('tc','cc')">Copier</button><span class="cp" id="cc">&#10003;</span></div></div>
  <textarea id="tc" readonly style="min-height:340px;"></textarea>
</div>
<div class="block">
  <div class="bh"><span class="bl j">JAVASCRIPT</span><div><button class="bc" onclick="doCopy('tj','cj')">Copier</button><span class="cp" id="cj">&#10003;</span></div></div>
  <textarea id="tj" readonly style="min-height:140px;"></textarea>
</div>

<hr style="border:none;border-top:1px solid #ddd;margin:32px 0;">

<h1 style="margin-bottom:6px;">Embed direct — Iframe</h1>
<p class="sub">Colle ce code HTML n'importe où pour afficher la page me.onlymatt.ca en place (WordPress, Squarespace, email, autre site…)</p>
<div class="block">
  <div class="bh"><span class="bl h">HTML</span><div><button class="bc" onclick="doCopy('te','ce')">Copier</button><span class="cp" id="ce">&#10003;</span></div></div>
  <textarea id="te" readonly style="min-height:60px;"></textarea>
</div>

<script>
document.getElementById('th').value =
'<!-- Bouton -->\n' +
'<button class="omp-trigger" id="ompOpenBtn">\n' +
'  &#9776; ONLYMATT\n' +
'</button>\n\n' +
'<!-- Overlay popup -->\n' +
'<div class="omp-overlay" id="ompOverlay">\n' +
'  <div class="omp-modal">\n' +
'    <button class="omp-close" id="ompCloseBtn">&times;</button>\n' +
'    <iframe class="omp-iframe" src="https://me.onlymatt.ca" title="ONLYMATT"></iframe>\n' +
'  </div>\n' +
'</div>';

document.getElementById('tc').value =
'.omp-trigger {\n' +
'  display: inline-flex;\n' +
'  align-items: center;\n' +
'  gap: 10px;\n' +
'  background: #000;\n' +
'  color: #fff;\n' +
'  border: none;\n' +
'  border-radius: 14px;\n' +
'  padding: 12px 22px;\n' +
'  cursor: pointer;\n' +
'  font-size: 14px;\n' +
'  font-weight: 700;\n' +
'  letter-spacing: 0.1em;\n' +
'  text-transform: uppercase;\n' +
'  transition: transform 0.2s, box-shadow 0.2s;\n' +
'  box-shadow: 0 4px 20px rgba(0,0,0,0.18);\n' +
'  position: relative;\n' +
'  overflow: hidden;\n' +
'}\n' +
'.omp-trigger:hover {\n' +
'  transform: scale(1.04);\n' +
'  box-shadow: 0 8px 32px rgba(0,0,0,0.28);\n' +
'}\n' +
'@keyframes ompShimmer {\n' +
'  0%   { transform: translateX(-100%) skewX(-15deg); }\n' +
'  100% { transform: translateX(250%) skewX(-15deg); }\n' +
'}\n' +
'.omp-trigger::after {\n' +
'  content: \'\';\n' +
'  position: absolute;\n' +
'  top: 0; left: 0;\n' +
'  width: 40%; height: 100%;\n' +
'  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);\n' +
'  animation: ompShimmer 3s ease-in-out infinite;\n' +
'  pointer-events: none;\n' +
'}\n' +
'.omp-overlay {\n' +
'  display: none;\n' +
'  position: fixed;\n' +
'  inset: 0;\n' +
'  background: rgba(0,0,0,0.6);\n' +
'  z-index: 9999;\n' +
'  align-items: center;\n' +
'  justify-content: center;\n' +
'  padding: 16px;\n' +
'}\n' +
'.omp-overlay.omp-open {\n' +
'  display: flex;\n' +
'}\n' +
'.omp-modal {\n' +
'  background: #000;\n' +
'  border-radius: 20px;\n' +
'  overflow: hidden;\n' +
'  width: 100%;\n' +
'  max-width: 420px;\n' +
'  height: 80vh;\n' +
'  max-height: 720px;\n' +
'  position: relative;\n' +
'  box-shadow: 0 24px 80px rgba(0,0,0,0.5);\n' +
'}\n' +
'.omp-close {\n' +
'  position: absolute;\n' +
'  top: 12px; right: 14px;\n' +
'  background: rgba(255,255,255,0.12);\n' +
'  border: none;\n' +
'  color: #fff;\n' +
'  font-size: 18px;\n' +
'  width: 32px; height: 32px;\n' +
'  border-radius: 50%;\n' +
'  cursor: pointer;\n' +
'  z-index: 10;\n' +
'  display: flex;\n' +
'  align-items: center;\n' +
'  justify-content: center;\n' +
'  transition: background 0.2s;\n' +
'}\n' +
'.omp-close:hover { background: rgba(255,255,255,0.25); }\n' +
'.omp-iframe {\n' +
'  width: 100%;\n' +
'  height: 100%;\n' +
'  border: none;\n' +
'  display: block;\n' +
'}';

document.getElementById('tj').value =
'(function() {\n' +
'  var overlay = document.getElementById(\'ompOverlay\');\n' +
'  document.getElementById(\'ompOpenBtn\').addEventListener(\'click\', function() {\n' +
'    overlay.classList.add(\'omp-open\');\n' +
'  });\n' +
'  document.getElementById(\'ompCloseBtn\').addEventListener(\'click\', function() {\n' +
'    overlay.classList.remove(\'omp-open\');\n' +
'  });\n' +
'  overlay.addEventListener(\'click\', function(e) {\n' +
'    if (e.target === overlay) overlay.classList.remove(\'omp-open\');\n' +
'  });\n' +
'  document.addEventListener(\'keydown\', function(e) {\n' +
'    if (e.key === \'Escape\') overlay.classList.remove(\'omp-open\');\n' +
'  });\n' +
'})();';

function doCopy(textId, confirmId) {
  navigator.clipboard.writeText(document.getElementById(textId).value).then(function() {
    var el = document.getElementById(confirmId);
    el.style.display = 'inline';
    setTimeout(function() { el.style.display = 'none'; }, 1800);
  });
}

document.getElementById('te').value =
'<iframe\n' +
'  src="https://me.onlymatt.ca"\n' +
'  style="width:100%;max-width:480px;height:100vh;border:none;display:block;"\n' +
'></iframe>';
</script>
</body>
</html>
